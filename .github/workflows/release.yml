name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Python setuptools (for node-gyp)
        run: pip install setuptools

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npx tsc && npx vite build

      - name: Package & Publish
        run: npx electron-builder --publish always
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: macos-latest
            arch: arm64
          - runner: macos-13
            arch: x64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Python setuptools (for node-gyp)
        run: pip3 install setuptools --break-system-packages || pip3 install setuptools

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npx tsc && npx vite build

      - name: Package & Publish
        run: npx electron-builder --mac --${{ matrix.arch }} --publish always
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm fakeroot python3-setuptools

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npx tsc && npx vite build

      - name: Package & Publish
        run: npx electron-builder --publish always
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
